<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passengers - Airline MS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">✈️ AirLine MS</div>
    <ul class="nav-links">
  <li><a href="index.html">Dashboard</a></li>
  <li><a href="flights.html">Flights</a></li>
  <li><a href="passengers.html">Passengers</a></li>
  <li><a href="bookings.html">Bookings</a></li>
  <li><a href="search.html">Search</a></li>
  <li><a href="reports.html">Reports</a></li>
  <li><a href="ticket.html">Ticket</a></li>
  <li><a href="calendar.html">Calendar</a></li>
  <li><a href="tracking.html">Tracking</a></li>
<li><a href="seatmap.html">Seat Map</a></li>
<li><a href="history.html">History</a></li>
</ul>
    <button class="bell-btn" onclick="NotificationSystem.togglePanel()">
      🔔
      <span class="bell-badge" id="bellBadge" style="display:none">0</span>
    </button>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <div class="notif-panel" id="notifPanel">
    <div class="notif-panel-header">
      <h3>🔔 Notifications</h3>
      <button class="clear-btn" onclick="NotificationSystem.clearAll()">Clear All</button>
    </div>
    <div id="notifList"></div>
  </div>

  <div class="container" style="margin-top:30px">
    <div class="page-header">
      <h1>👤 Passenger Management</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Add New Passenger</button>
    </div>

    <div class="alert" id="alert"></div>

    <div class="table-section">
      <table>
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>CNIC</th>
            <th>Nationality</th>
            <th>Date of Birth</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="passengersTable">
          <tr><td colspan="7">Loading passengers...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="passengerModal">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Add New Passenger</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="e.g. Ali Ahmed">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="e.g. ali@gmail.com">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="e.g. 0300-1234567">
        </div>
        <div class="form-group">
          <label>CNIC Number</label>
          <input type="text" id="cnic" placeholder="e.g. 42101-1234567-1">
        </div>
        <div class="form-group">
          <label>Nationality</label>
          <input type="text" id="nationality" placeholder="e.g. Pakistani" value="Pakistani">
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="dateOfBirth">
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="savePassenger()">
        Save Passenger
      </button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    async function loadPassengers() {
      const passengers = await getPassengers();
      const tbody = document.getElementById('passengersTable');
      tbody.innerHTML = '';

      if (passengers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">No passengers found.</td></tr>';
        return;
      }

      passengers.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td><b>${p.name}</b></td>
            <td>${p.email}</td>
            <td>${p.phone}</td>
            <td>${p.cnic}</td>
            <td>${p.nationality}</td>
            <td>${p.dateOfBirth ? new Date(p.dateOfBirth).toLocaleDateString() : 'N/A'}</td>
            <td>
              <button class="btn btn-danger"
                onclick="removePassenger('${p._id}', '${p.name}')">
                Delete
              </button>
            </td>
          </tr>`;
      });
    }

    async function savePassenger() {
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        cnic: document.getElementById('cnic').value,
        nationality: document.getElementById('nationality').value,
        dateOfBirth: document.getElementById('dateOfBirth').value
      };

      if (!data.name || !data.email || !data.phone || !data.cnic) {
        showAlert('Please fill in all required fields.', 'error');
        return;
      }

      const result = await addPassenger(data);

      if (result._id) {
        showAlert('Passenger added successfully!', 'success');
        closeModal();
        notifyPassengerAdded(data.name);
        loadPassengers();
      } else {
        showAlert(result.message || 'Error adding passenger. Please try again.', 'error');
      }
    }

    async function removePassenger(id, name) {
      if (confirm(`Are you sure you want to delete passenger ${name}?`)) {
        await deletePassenger(id);
        showAlert('Passenger deleted successfully!', 'success');
        notifyPassengerDeleted(name);
        loadPassengers();
      }
    }

    function openModal() {
      document.getElementById('passengerModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('passengerModal').classList.remove('active');
    }

    function showAlert(msg, type) {
      const alert = document.getElementById('alert');
      alert.textContent = msg;
      alert.className = `alert ${type}`;
      setTimeout(() => { alert.className = 'alert'; }, 3000);
    }

    NotificationSystem.init();
    loadPassengers();
  </script>

</body>
</html>
