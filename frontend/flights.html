<script>
async function saveFlight() {
  try {
    const flightNumber = document.getElementById('flightNumber').value.trim();
    const origin      = document.getElementById('origin').value;
    const destination = document.getElementById('destination').value;

    const depInput = document.getElementById('departureTime').value;
    const arrInput = document.getElementById('arrivalTime').value;

    const totalSeats  = Number(document.getElementById('totalSeats').value);
    const fare        = Number(document.getElementById('fare').value);
    const status      = document.getElementById('status').value;

    // VALIDATION
    if (!flightNumber || !origin || !destination || !depInput || !arrInput) {
      showAlert('Please fill all fields!', 'error');
      return;
    }

    if (origin === destination) {
      showAlert('Origin and destination cannot be same!', 'error');
      return;
    }

    const departureDate = new Date(depInput);
    const arrivalDate   = new Date(arrInput);

    if (isNaN(departureDate) || isNaN(arrivalDate)) {
      showAlert('Invalid date format!', 'error');
      return;
    }

    if (arrivalDate <= departureDate) {
      showAlert('Arrival must be after departure!', 'error');
      return;
    }

    if (totalSeats <= 0 || fare <= 0) {
      showAlert('Seats and fare must be greater than 0!', 'error');
      return;
    }

    const data = {
      flightNumber,
      origin,
      destination,
      departureTime: departureDate.toISOString(),
      arrivalTime: arrivalDate.toISOString(),
      totalSeats,
      availableSeats: totalSeats,
      fare,
      status
    };

    console.log("SENDING DATA 👉", data);

    // ✅ FIX: use api.js function instead of direct fetch
    const result = await addFlight(data);

    console.log("RESPONSE 👉", result);

    if (!result.error) {
      showAlert('Flight added successfully!', 'success');
      closeModal();
      clearForm();
      loadFlights();
    } else {
      showAlert(result.message || 'Backend error', 'error');
    }

  } catch (err) {
    console.error("ERROR 👉", err);
    showAlert('Something went wrong!', 'error');
  }
}
</script>
